<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リアルタイム領地マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body { margin: 0; font-family: sans-serif; }
  #map { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// マップ（余計な情報を減らす）
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([35.68, 139.76], 11);

// シンプル背景（ラベルなし）
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

// チーム色
const colors = {
  none: 'rgba(200,200,200,0.4)',
  red: 'rgba(255,0,0,0.6)',
  blue: 'rgba(0,0,255,0.6)',
  green: 'rgba(0,200,0,0.6)'
};

let wardState = {};

function cycleTeam(name) {
  const order = ['none','red','blue','green'];
  let current = wardState[name] || 'none';
  let next = order[(order.indexOf(current)+1)%order.length];
  wardState[name] = next;
  localStorage.setItem('tokyoWards', JSON.stringify(wardState));
  return next;
}

function getColor(name) {
  return colors[wardState[name] || 'none'];
}

const saved = localStorage.getItem('tokyoWards');
if (saved) wardState = JSON.parse(saved);

// ★リアルGeoJSON推奨（ここ重要）
// https://geoshape.ex.nii.ac.jp/ より取得推奨

fetch('tokyo23.geojson')
.then(res => res.json())
.then(data => {
  L.geoJSON(data, {
    style: feature => ({
      color: '#222',
      weight: 1.5,
      fillColor: getColor(feature.properties.name),
      fillOpacity: 0.7
    }),
    onEachFeature: (feature, layer) => {
      const name = feature.properties.name;

      layer.on('click', () => {
        const team = cycleTeam(name);
        layer.setStyle({ fillColor: colors[team] });
      });
    }
  }).addTo(map);
});
</script>
</body>
</html>
